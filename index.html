<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>カジノ風ルーレット</title>

<style>

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:radial-gradient(circle,#1b1b1b,#000);

    overflow:hidden;

    color:white;

}

.container{

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    height:100vh;

}

h1{

    color:#FFD700;

    font-size:42px;

    margin-bottom:20px;

    text-shadow:0 0 20px gold;

}

.pointer{

    width:0;

    height:0;

    border-left:20px solid transparent;

    border-right:20px solid transparent;

    border-top:45px solid white;

    margin-bottom:-5px;

    z-index:100;

}

#wheel{

    width:360px;

    height:360px;

    border-radius:50%;

    border:12px solid gold;

    position:relative;

    transition:transform 6s cubic-bezier(.15,.85,.15,1);

    box-shadow:

        0 0 30px gold,

        0 0 60px orange;
    background:

    conic-gradient(

    #e53935 0deg 30deg,

    #111 30deg 60deg,

    #43a047 60deg 90deg,

    #111 90deg 120deg,

    #1e88e5 120deg 150deg,

    #111 150deg 180deg,

    #fb8c00 180deg 210deg,

    #111 210deg 240deg,

    #8e24aa 240deg 270deg,

    #111 270deg 300deg,

    #00acc1 300deg 330deg,

    #111 330deg 360deg

    );

}

.center{

    position:absolute;

    left:50%;

    top:50%;

    transform:translate(-50%,-50%);

    width:95px;

    height:95px;

    background:#FFD700;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#111;

    font-size:22px;

    font-weight:bold;

    box-shadow:0 0 25px white;

}

button{

    margin-top:35px;

    padding:16px 55px;

    font-size:24px;

    border:none;

    border-radius:12px;

    background:linear-gradient(#FFD700,#F5B000);

    color:black;

    cursor:pointer;

    font-weight:bold;

    transition:.3s;

}

button:hover{

    transform:scale(1.05);

    box-shadow:0 0 20px gold;

}

button:active{

    transform:scale(.96);

}

#result{

    margin-top:35px;

    font-size:40px;

    color:#FFD700;

    text-align:center;

    text-shadow:0 0 20px gold;

}
  .confetti{

    position:fixed;

    width:12px;

    height:18px;

    top:-20px;

    animation:fall linear forwards;

}

@keyframes fall{

    to{

        transform:translateY(110vh) rotate(720deg);

        opacity:0;

    }

}

</style>

</head>

<body>

<div class="container">

    <h1>🎰 CASINO ROULETTE 🎰</h1>

    <div class="pointer"></div>

    <div id="wheel">

        <div class="center">

            SPIN

        </div>

    </div>

    <button onclick="spin()">

        回す！

    </button>

    <div id="result"></div>

</div>

<script>

let spinning=false;

const wheel=document.getElementById("wheel");

const result=document.getElementById("result");
    function playSound(){

    try{

        const audio=new(window.AudioContext||window.webkitAudioContext)();

        const osc=audio.createOscillator();

        const gain=audio.createGain();

        osc.type="triangle";

        osc.frequency.value=900;

        osc.connect(gain);

        gain.connect(audio.destination);

        gain.gain.value=0.08;

        osc.start();

        setTimeout(()=>{

            osc.stop();

            audio.close();

        },250);

    }catch(e){}

}

function confetti(){

    const colors=[

        "#ff0000",

        "#00ff00",

        "#ffff00",

        "#00ffff",

        "#ff00ff",

        "#ffffff",

        "#ff8800"

    ];

    for(let i=0;i<200;i++){

        let paper=document.createElement("div");

        paper.className="confetti";

        paper.style.left=Math.random()*100+"vw";

        paper.style.background=

            colors[Math.floor(Math.random()*colors.length)];

        paper.style.animationDuration=

            (2+Math.random()*3)+"s";

        document.body.appendChild(paper);

        setTimeout(()=>{

            paper.remove();

        },5000);

    }

}
    function spin(){

    if(spinning) return;

    spinning=true;

    result.innerHTML="";

    playSound();

    const stopAngle=360*8+15;

    wheel.style.transform=

        "rotate("+stopAngle+"deg)";

    setTimeout(()=>{

        result.innerHTML=

        "🎉<br><span style='font-size:55px;'>💴10,000円💴</span><br>大当たり！！";

        confetti();

        spinning=false;

    },6000);

}

</script>

</body>

</html>
