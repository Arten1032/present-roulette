<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport"

content="width=device-width,initial-scale=1.0">

<title>LINE Casino Roulette</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

font-family:

-apple-system,

BlinkMacSystemFont,

"Helvetica Neue",

sans-serif;

}

body{

background:

radial-gradient(circle,#2f2f2f,#111);

overflow:hidden;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

color:white;

}

.container{

width:100%;

max-width:430px;

padding:20px;

text-align:center;

}

h1{

color:#00ff88;

font-size:34px;

margin-bottom:18px;

text-shadow:

0 0 8px #00ff88,

0 0 18px #00ff88,

0 0 35px #00ff88;

}

.pointer{

font-size:42px;

color:gold;

margin-bottom:10px;

animation:pointer 1s infinite;

}

@keyframes pointer{

0%{

transform:translateY(0);

}

50%{

transform:translateY(8px);

}

100%{

transform:translateY(0);

}

}

#wheel{

position:relative;

margin:auto;

width:320px;

height:320px;

border-radius:50%;

border:12px solid gold;

background:

conic-gradient(

#ff3b30 0deg 45deg,

#007aff 45deg 90deg,

#34c759 90deg 135deg,

#ffd60a 135deg 180deg,

#ff2d55 180deg 225deg,

#5ac8fa 225deg 270deg,

#30d158 270deg 315deg,

#bf5af2 315deg 360deg

);

box-shadow:

0 0 30px gold,

0 0 70px orange,

inset 0 0 30px #000;

transition:

transform 6s cubic-bezier(.15,.9,.2,1);

}

.center{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:82px;

height:82px;

border-radius:50%;

background:gold;

border:6px solid white;

box-shadow:

0 0 20px yellow;

}

button{

margin-top:30px;

width:250px;

height:60px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:20px;

background:

linear-gradient(

45deg,

#00c853,

#00ff88

);

color:white;

cursor:pointer;

box-shadow:

0 0 20px #00ff88;

transition:.2s;

}

button:active{

transform:scale(.95);

}

button:disabled{

opacity:.5;

}

#result{

margin-top:22px;

font-size:34px;

font-weight:bold;

min-height:55px;

}

.history{

margin-top:25px;

background:#1b1b1b;

border-radius:15px;

padding:15px;

height:180px;

overflow:auto;

text-align:left;

}

.history h2{

margin-bottom:10px;

color:#00ff88;

font-size:20px;

}

.history ul{

list-style:none;

}

.history li{

padding:6px;

border-bottom:

1px solid #333;

}

.confetti{

position:fixed;

width:10px;

height:10px;

pointer-events:none;

z-index:9999;

}

.coin{

position:fixed;

font-size:28px;

pointer-events:none;

z-index:9999;

}

.flash{

position:fixed;

left:0;

top:0;

width:100vw;

height:100vh;

background:rgba(255,215,0,.35);

pointer-events:none;

z-index:9998;

}

</style>

</head>

<body>

<div class="container">

<h1>

🎰 LINE CASINO

</h1>

<div class="pointer">

▼

</div>

<div id="wheel">

<div class="center">

</div>

</div>

<button id="spin">

🎲 回す

</button>

<div id="result">

</div>

<div class="history">

<h2>

当選履歴

</h2>

<ul id="history">

</ul>

</div>

</div>

<div

class="flash"

id="flash">

</div>

<script>
 // ===============================

// LINE CASINO ROULETTE

// 第2回 JavaScript 基本処理

// ===============================

const prizes = [

  { text: "100円", weight: 30 },

  { text: "500円", weight: 20 },

  { text: "1000円", weight: 15 },

  { text: "2000円", weight: 10 },

  { text: "5000円", weight: 5 },

  { text: "もう一回", weight: 10 },

  { text: "ハズレ", weight: 9 },

  { text: "10000円", weight: 1 }

];

const wheel = document.getElementById("wheel");

const spin = document.getElementById("spin");

const result = document.getElementById("result");

const history = document.getElementById("history");

let rotation = 0;

let spinning = false;

// AudioContext（iPhone対応）

let audioContext = null;

function getAudio(){

    if(!audioContext){

        audioContext =

        new(window.AudioContext||

        window.webkitAudioContext)();

    }

    return audioContext;

}

// 効果音

function playTone(freq,duration){

    const ctx = getAudio();

    const osc = ctx.createOscillator();

    const gain = ctx.createGain();

    osc.type="triangle";

    osc.frequency.value=freq;

    osc.connect(gain);

    gain.connect(ctx.destination);

    gain.gain.value=0.15;

    osc.start();

    gain.gain.exponentialRampToValueAtTime(

        0.0001,

        ctx.currentTime+duration

    );

    osc.stop(ctx.currentTime+duration);

}

// 重み付き抽選

function lottery(){

    const total =

    prizes.reduce((a,b)=>a+b.weight,0);

    let rand =

    Math.random()*total;

    for(const prize of prizes){

        rand-=prize.weight;

        if(rand<=0){

            return prize.text;

        }

    }

    return prizes[0].text;

}

// 履歴

function addHistory(text){

    const li =

    document.createElement("li");

    const now = new Date();

    li.textContent =

    `${now.toLocaleTimeString()}　${text}`;

    history.prepend(li);

}

// 回転

spin.addEventListener("click",async()=>{

    if(spinning) return;

    spinning=true;

    spin.disabled=true;

    result.innerHTML="";

    // iPhoneは最初のタップでAudio開始

    await getAudio().resume();

    playTone(280,0.15);

    const prize =

    lottery();

    const index =

    prizes.findIndex(

    p=>p.text===prize

    );

    const section =

    360/prizes.length;

    const target =

    index*section+

    section/2;

    rotation +=

    360*8-target;

    wheel.style.transform =

    `rotate(${rotation}deg)`;

    if(navigator.vibrate){

        navigator.vibrate(80);

    }

    setTimeout(()=>{

        result.innerHTML=

        `🎉<br><span style="font-size:42px">${prize}</span>`;

        addHistory(prize);

        playTone(

        prize==="10000円"

        ?1000:550,

        0.35

        );

        if(prize==="10000円"){

    createConfetti();

    flashScreen();

    coinRain();

    showJackpot();

    playTone(1200,0.5);

    setTimeout(()=>{

        playTone(1600,0.5);

    },150);

    setTimeout(()=>{

        playTone(2000,0.8);

    },300);

    if(navigator.vibrate){

        navigator.vibrate([300,100,300,100,600]);

    }

}

        spinning=false;

        spin.disabled=false;

    },6100);

});
 // ===================================

// 第3回 豪華演出

// ===================================

// 紙吹雪

function createConfetti(){

    for(let i=0;i<180;i++){

        const c=document.createElement("div");

        c.className="confetti";

        c.style.left=Math.random()*100+"vw";

        c.style.top="-20px";

        c.style.background=

        `hsl(${Math.random()*360},100%,50%)`;

        document.body.appendChild(c);

        const x=(Math.random()-0.5)*500;

        const rotate=Math.random()*1080;

        c.animate([

            {

                transform:"translate(0,0) rotate(0deg)",

                opacity:1

            },

            {

                transform:

                `translate(${x}px,120vh) rotate(${rotate}deg)`,

                opacity:0

            }

        ],{

            duration:2800+Math.random()*1200,

            easing:"ease-out"

        });

        setTimeout(()=>{

            c.remove();

        },4200);

    }

}

// 金色フラッシュ

function flashScreen(){

    const flash=

    document.getElementById("flash");

    flash.animate([

        {opacity:0},

        {opacity:1},

        {opacity:0}

    ],{

        duration:900

    });

}

// コイン演出

function coinRain(){

    for(let i=0;i<70;i++){

        const coin=

        document.createElement("div");

        coin.className="coin";

        coin.innerHTML="🪙";

        coin.style.left=

        Math.random()*100+"vw";

        coin.style.top="-40px";

        document.body.appendChild(coin);

        coin.animate([

            {

                transform:

                "translateY(0) rotate(0deg)"

            },

            {

                transform:

                `translateY(120vh)

                rotate(${720+Math.random()*720}deg)`

            }

        ],{

            duration:2500+Math.random()*1000,

            easing:"ease-in"

        });

        setTimeout(()=>{

            coin.remove();

        },3800);

    }

}

// JACKPOT

function showJackpot(){

    const box=

    document.createElement("div");

    box.innerHTML=

    "💰<br>10000円<br>GET!!";

    box.style.position="fixed";

    box.style.left="50%";

    box.style.top="50%";

    box.style.transform=

    "translate(-50%,-50%) scale(.3)";

    box.style.fontSize="60px";

    box.style.fontWeight="bold";

    box.style.textAlign="center";

    box.style.color="gold";

    box.style.textShadow=

    "0 0 20px yellow,0 0 40px orange";

    box.style.zIndex="99999";

    document.body.appendChild(box);

    box.animate([

        {

            transform:

            "translate(-50%,-50%) scale(.2)",

            opacity:0

        },

        {

            transform:

            "translate(-50%,-50%) scale(1.2)",

            opacity:1

        },

        {

            transform:

            "translate(-50%,-50%) scale(1)",

            opacity:1

        }

    ],{

        duration:800,

        fill:"forwards"

    });

    setTimeout(()=>{

        box.animate([

            {opacity:1},

            {opacity:0}

        ],{

            duration:500

        });

        setTimeout(()=>{

            box.remove();

        },500);

    },2200);

}

// ネオン点滅

setInterval(()=>{

    const glow=25+Math.random()*30;

    wheel.style.boxShadow=

    `0 0 ${glow}px gold,

     0 0 ${glow*2}px orange,

     inset 0 0 30px #000`;

},250);
