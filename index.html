<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>4分割ルーレット</title>

<style>

body{margin:0;font-family:sans-serif;background:#111;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;overflow:hidden}

.wrap{text-align:center}

.pointer{width:0;height:0;border-left:15px solid transparent;border-right:15px solid transparent;border-top:35px solid #fff;margin:auto}

#wheel{width:300px;height:300px;border-radius:50%;border:8px solid gold;margin:10px auto;position:relative;transition:transform 5s cubic-bezier(.15,.8,.15,1);

background:conic-gradient(

#d32f2f 0 90deg,

#1976d2 90deg 180deg,

#388e3c 180deg 270deg,

#f9a825 270deg 360deg)}

.label{position:absolute;left:50%;top:50%;font-weight:bold;font-size:22px;transform-origin:0 0}

.l1{transform:rotate(45deg) translate(70px) rotate(-45deg)}

.l2{transform:rotate(135deg) translate(70px) rotate(-135deg)}

.l3{transform:rotate(225deg) translate(70px) rotate(-225deg)}

.l4{transform:rotate(315deg) translate(70px) rotate(-315deg)}

.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:70px;height:70px;border-radius:50%;background:#fff;color:#000;display:flex;align-items:center;justify-content:center;font-weight:bold}

button{padding:12px 35px;font-size:20px;border:none;border-radius:8px;background:gold;font-weight:bold;cursor:pointer}

#result{margin-top:20px;font-size:34px;color:gold;font-weight:bold}

.c{position:fixed;width:8px;height:14px;top:-20px;animation:f 3s linear forwards}

@keyframes f{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

</style>

</head>

<body>

<div class="wrap">

<div class="pointer"></div>

<div id="wheel">

<div class="label l1">💴10,000</div>

<div class="label l2">💴4,000</div>

<div class="label l3">💴3,000</div>

<div class="label l4">💴2,000</div>

<div class="center">SPIN</div>

</div>

<button onclick="spin()">回す！</button>

<div id="result"></div>

</div>

<script>

const wheel=document.getElementById("wheel");

const result=document.getElementById("result");

let busy=false;

const prizes=[

{money:"💴10,000円",angle:45},

{money:"💴4,000円",angle:135},

{money:"💴3,000円",angle:225},

{money:"💴2,000円",angle:315}

];

function beep(){

try{

const a=new(window.AudioContext||window.webkitAudioContext)();

const o=a.createOscillator(),g=a.createGain();

o.connect(g);g.connect(a.destination);

o.frequency.value=800;

g.gain.value=.08;

o.start();

setTimeout(()=>{o.stop();a.close();},180);

}catch(e){}

}

function confetti(){

const colors=["#ff0","#f00","#0f0","#0ff","#f0f","#fff"];

for(let i=0;i<120;i++){

const d=document.createElement("div");

d.className="c";

d.style.left=Math.random()*100+"vw";

d.style.background=colors[Math.floor(Math.random()*colors.length)];

d.style.animationDuration=(2+Math.random()*2)+"s";

document.body.appendChild(d);

setTimeout(()=>d.remove(),4000);

}

}

function spin(){

if(busy)return;

busy=true;

result.textContent="";

beep();

const prize=prizes[Math.floor(Math.random()*4)];

const rotate=360*6+(360-prize.angle)ｰ45;

wheel.style.transform = `rotate(${rotate}deg)`;

setTimeout(()=>{

result.innerHTML=`🎉<br>${prize.money}`;

confetti();

busy=false;

},5000);

}

</script>

</body>

</html>
