<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プレゼントルーレット</title>

<style>

body{

    margin:0;

    background:#111827;

    color:white;

    font-family:sans-serif;

    text-align:center;

}

h1{

    color:#FFD700;

    margin-top:40px;

}

button{

    background:#FFD700;

    color:#000;

    border:none;

    padding:15px 35px;

    font-size:20px;

    border-radius:30px;

    cursor:pointer;

}

#wheel{

    width:250px;

    height:250px;

    margin:30px auto;

    border-radius:50%;

    border:8px solid gold;

    background:conic-gradient(

        #ff5a5a 0 25%,

        #5aa9ff 25% 50%,

        #61d96d 50% 75%,

        #ffd54f 75% 100%

    );

}#pointer{

    width:0;

    height:0;

    margin:20px auto -12px;

    border-left:18px solid transparent;

    border-right:18px solid transparent;

    border-top:35px solid gold;

    filter:drop-shadow(0 0 10px gold);

}#center{

    width:90px;

    height:90px;

    background:gold;

    border-radius:50%;

    margin:80px auto;

    display:flex;

    align-items:center;

    justify-content:center;

    color:#000;

    font-size:42px;

    font-weight:bold;

    box-shadow:0 0 20px gold;

}</style>

</head>

<body>

<h1>🎁 プレゼントルーレット 🎁</h1>
<div id="pointer"></div>
<div id="wheel">

    <div id="center">

        🎰

    </div>

</div>

<button id="spinBtn">🎰 回す</button>

<p id="result"></p>
<script>

const prizes = ["2000円","3000円","4000円","5000円"];

let rotating = false;

document.getElementById("spinBtn").onclick = function(){

    if(rotating) return;

    rotating = true;

    const wheel = document.getElementById("wheel");

    const result = document.getElementById("result");

    const index = Math.floor(Math.random()*4);

    const angle = 2160 + (index*90) + 45;

    wheel.style.transition = "transform 5s ease-out";

    wheel.style.transform = "rotate("+angle+"deg)";

    setTimeout(function(){

        result.innerHTML =

        "🎉<br><br><span style='font-size:40px;font-weight:bold;'>"+prizes[index]+"</span><br><br>この金額以内で好きなものをプレゼント🎁<br><br>📸スクリーンショットを撮って送ってね😊";

        rotating = false;

    },5000);

};

</script>    
</body>

</html>
