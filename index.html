<!DOCTYPE html>

<html lang="ja">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>LINE Casino Roulette</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-glow"></div>

<div class="container">

    <h1>🎰 LINE CASINO</h1>

    <div class="pointer">

        ▼

    </div>

    <div class="roulette-wrapper">

        <canvas id="roulette"

                width="420"

                height="420">

        </canvas>

        <div class="center-circle">

            GO

        </div>

    </div>

    <button id="spinButton">

        🎲 ルーレットを回す

    </button>

    <div id="result">

    </div>

    <section class="history">

        <h2>

            当選履歴

        </h2>

        <ul id="historyList">

        </ul>

    </section>

</div>

<div id="flash"></div>

<div id="jackpot">

    <span>

        💰10000円GET!!💰

    </span>

</div>

<script src="script.js"></script>

</body>

</html>
