<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プレゼントルーレット</title>

<style>

*{

margin:0;

padding:0;

box-sizing:border-box;

}

body{

background:radial-gradient(circle,#222,#000);

font-family:Arial,sans-serif;

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;

color:white;

}

.container{

text-align:center;

}

h1{

font-size:42px;

margin-bottom:20px;

color:#FFD700;

text-shadow:

0 0 10px gold,

0 0 20px orange,

0 0 35px gold;

}

.pointer{

width:0;

height:0;

border-left:18px solid transparent;

border-right:18px solid transparent;

border-top:40px solid white;

margin:auto;

margin-bottom:-5px;

position:relative;

z-index:5;

}

#wheel{

width:340px;

height:340px;

border-radius:50%;

border:10px solid gold;

margin:auto;

position:relative;

overflow:hidden;

transition:transform 5s cubic-bezier(.15,.85,.15,1);

background:

conic-gradient(

#e53935 0deg 90deg,

#1e88e5 90deg 180deg,

#43a047 180deg 270deg,

#fb8c00 270deg 360deg

);

box-shadow:

0 0 20px gold,

0 0 40px orange;

}
 
.label{

position:absolute;

left:50%;

top:50%;

width:80px;

margin-left:-40px;

text-align:center;

font-size:20px;

font-weight:bold;

color:white;

text-shadow:2px 2px 6px black;

transform-origin:center;

}

.l1{

transform:translate(-50%,-50%) translateY(-110px);

}

.l2{

transform:translate(-50%,-50%) translateX(110px);

}

.l3{

transform:translate(-50%,-50%) translateY(110px);

}

.l4{

transform:translate(-50%,-50%) translateX(-110px);

}

.center{

position:absolute;

left:50%;

top:50%;

transform:translate(-50%,-50%);

width:90px;

height:90px;

border-radius:50%;

background:white;

color:black;

font-weight:bold;

display:flex;

justify-content:center;

align-items:center;

box-shadow:0 0 20px white;

}

button{

margin-top:30px;

padding:15px 45px;

font-size:22px;

font-weight:bold;

background:gold;

border:none;

border-radius:10px;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);

}

button:disabled{

background:#777;

color:#ddd;

cursor:not-allowed;

}

#result{

margin-top:25px;

font-size:34px;

font-weight:bold;

color:gold;

min-height:80px;

}

.c{

position:fixed;

width:8px;

height:15px;

top:-20px;

animation:fall 3s linear forwards;

}

@keyframes fall{

to{

transform:translateY(110vh) rotate(720deg);

opacity:0;

}

}

</style>

</head>

<body>

<div class="container">

<h1>🎰 プレゼントルーレット 🎰</h1>

<div class="pointer"></div>

<div id="wheel">

<div class="label l1">💴10,000</div>

<div class="label l2">💴5,000</div>

<div class="label l3">💴3,000</div>

<div class="label l4">💴2,000</div>

<div class="center">SPIN</div>

</div>
<button id="spinBtn">

🎰 回す！

</button>

<div id="result"></div>

</div>

<script>

const wheel=document.getElementById("wheel");

const btn=document.getElementById("spinBtn");

const result=document.getElementById("result");

let spinning=false;

const prizes=[

{money:"💴10,000円",angle:45},

{money:"💴5,000円",angle:135},

{money:"💴3,000円",angle:225},

{money:"💴2,000円",angle:315}

];

function confetti(){

const colors=[

"#FFD700",

"#ff0000",

"#00ff00",

"#00ffff",

"#ff00ff",

"#ffffff"

];

for(let i=0;i<150;i++){

const c=document.createElement("div");

c.className="c";

c.style.left=Math.random()*100+"vw";

c.style.background=

colors[Math.floor(Math.random()*colors.length)];

c.style.animationDuration=

(2+Math.random()*2)+"s";

document.body.appendChild(c);

setTimeout(()=>{

c.remove();

},4000);

}

}

function spin(){

if(spinning)return;

spinning=true;

btn.disabled=true;

btn.textContent="抽選済み";

result.innerHTML="";

const prize=

prizes[Math.floor(Math.random()*4)];

const rotate=

360*8+

(360-prize.angle)-45;

wheel.style.transform=

`rotate(${rotate}deg)`;
  setTimeout(()=>{

try{

const audio=new(window.AudioContext||window.webkitAudioContext)();

const osc=audio.createOscillator();

const gain=audio.createGain();

osc.type="triangle";

osc.frequency.value=900;

osc.connect(gain);

gain.connect(audio.destination);

gain.gain.value=0.08;

osc.start();

setTimeout(()=>{

osc.stop();

audio.close();

},250);

}catch(e){}

result.innerHTML=

`🎉<br><span style="font-size:50px;">${prize.money}</span>`;

confetti();

},5000);

}

btn.addEventListener("click",spin);

</script>

</body>

</html>
