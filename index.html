<!DOCTYPE html>

<html lang="ja">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>プレゼントルーレット</title>

<style>

body{

    margin:0;

    background:#111827;

    color:white;

    font-family:sans-serif;

    text-align:center;

}

h1{

    color:#FFD700;

    margin-top:40px;

}

button{

    background:#FFD700;

    color:#000;

    border:none;

    padding:15px 35px;

    font-size:20px;

    border-radius:30px;

    cursor:pointer;

}

#wheel{

    width:250px;

    height:250px;

    margin:30px auto;

    border-radius:50%;

    border:8px solid gold;

    background:conic-gradient(

        #ff5a5a 0 25%,

        #5aa9ff 25% 50%,

        #61d96d 50% 75%,

        #ffd54f 75% 100%

    );

}</style>

</head>

<body>

<h1>🎁 プレゼントルーレット 🎁</h1>

<div id="wheel"></div>

<button id="spinBtn">🎰 回す</button>

<p id="result"></p>
</body>

</html>
